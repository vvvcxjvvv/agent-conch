# Agent-Conch 默认配置
# 遵循设计文档: YAML 驱动 Agent 行为配置

# === LLM 模型配置 ===
model:
  provider: "litellm"              # 统一通过 litellm 调用
  name: "deepseek/deepseek-chat"   # DeepSeek (litellm 原生支持)
  api_base: null                   # litellm 自动路由
  api_key_env: "DEEPSEEK_API_KEY"  # 从环境变量读取
  temperature: 0.0
  max_tokens: 10240
  timeout: 300                     # 秒

# === Agent Loop 配置 ===
agent_loop:
  max_turns: 50                # 最大轮次
  max_time: 600                # 最大执行时间(秒)
  auto_compact: true           # 自动上下文压缩(P2 启用, P1 占位)

# === 工具配置 ===
tools:
  # 核心工具默认全部启用
  core_enabled: true
  # ToolSearch 自动阈值: 非核心工具 schema 超过 context window 的此比例时启用
  tool_search_threshold: 0.10
  # check_fn TTL 缓存时间(秒)
  check_fn_ttl: 30
  # 瞬态故障抑制时间(秒)
  transient_suppress: 60
  # 并行工具执行
  parallel_execution: true
  output_max_chars: 20000      # 超长工具输出落盘上限
  output_preview_chars: 4000   # 返回模型的预览长度

# === 沙箱配置 ===
sandbox:
  mode: "non-main"             # non-main | always | never
  default_backend: "local"     # local | docker(P2) | ssh(P2)
  # 敏感路径(硬编码不可覆盖, 用户规则叠加)
  sensitive_paths:
    - "/etc"
    - "~/.ssh"
    - "/.env"
    - "~/.config"
  # 工作目录限制
  allowed_roots: []            # 空 = 当前工作目录
  docker:
    image: "python:3.12-slim"
    memory_limit: "512m"
    cpu_limit: "1.0"
    network: "none"
    runtime: ""                # 使用 gVisor 时配置为 runsc
    volumes: []
  ssh:
    host: ""
    user: ""
    port: 22
    identity_file: ""
    strict_host_key: true
    connect_timeout: 10
    work_dir: "."
    allowed_roots: []
  network_policy:
    enforce: false
    allowlist: []               # 支持域名通配符与 CIDR

# === 状态存储配置 ===
state:
  storage_dir: "~/.agent-conch"  # 全局状态目录
  db_name: "state.db"            # 全局 SQLite 文件名
  trajectory_dir: "trajectories" # 轨迹目录(相对 storage_dir)

# === Layer 配置 ===
layers:
  enabled:
    - "execution_limits"        # P1
    - "observability"           # P3: OTel + SQLite spans
    - "llm_quota"               # P3: 配额熔断
    - "verification"            # P3: 写操作后自动验证
    - "suspend"                 # P3: 暂停/恢复
    - "pause_state_persist"     # P3: 暂停状态持久化
    - "cost_budget"            # P4: Token/时间/工具/资源综合预算

quota:
  max_tokens: 200000

# === P4 治理配置 ===
governance:
  enabled: true
  default_role: "admin"
  approval_level: 4            # 1 只读 / 2 写 / 3 执行 / 4 管理 / 5 关键
  policy_rules: []             # 支持 roles/senders/tools/actions/minimum_level/argument_contains
  content_safety_enabled: true
  redact_sensitive: true
  denied_content_patterns: []

mcp:
  enabled: true
  servers: []                  # {name, command, args, env, cwd, enabled}

hooks:
  enabled: true
  commands: []                 # {name, event, command, timeout, fail_closed, cwd, env}

budget:
  max_tokens: 200000
  max_seconds: 600
  max_tool_calls: 500
  max_resource_units: 1000

credentials:
  failure_cooldown: 60
  entries: []                  # {alias, provider, reference, backend, priority}

regression:
  auto_capture: true
  minimum_pass_rate: 1.0

scheduler:
  hard_timeout: 180            # 单任务硬中断上限，最大 3 分钟

coordinator:
  max_workers: 4
  worker_role: "worker"

verification:
  commands:
    - "ruff check src tests"
    - "mypy src"
    - "pytest -q"
  timeout: 180
  review_on_submit: true

api:
  host: "127.0.0.1"
  port: 8765

# === Prompt 配置 ===
prompt:
  system_prompt_mode: "base"   # base | enhanced
  discover_agents_md: true     # 从 cwd 向上遍历发现 AGENTS.md

# === 日志配置 ===
logging:
  level: "INFO"                # DEBUG | INFO | WARNING | ERROR
  format: "rich"               # rich | json | plain
