# AgentConch v2 MVP Profile — 终端用户对话
# 成熟框架最小组合：LangGraph + MCP + Mem0 + litellm + NeMo/LlamaGuard + console/langfuse
name: user-chat-v1
description: "终端用户对话 Profile — LangGraph ReAct + MCP filesystem + Mem0 + litellm + NeMo/LlamaGuard 护栏 + stacked tracer"
model: "openai/gpt-4o-mini"
model_fallback: "openai/gpt-4o-mini"
max_steps: 25
max_tokens: 100000
domains:
  information:
    impl: agents_md
    params:
      file: "../../AGENTS.md"
  orchestration:
    impl: langgraph_react
    params:
      model: "openai/gpt-4o-mini"
      recursion_limit: 25
  tool:
    impl: mcp_provider
    params:
      servers:
        - command: "npx"
          args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
  memory:
    impl: mem0
    params:
      path: "../../log/mem0-memory.jsonl"
      user_id: "auto"
      agent_id: "conch"
  guardrail:
    impl: stacked_guardrails
    params:
      providers:
        - impl: nemo_guardrails
          params:
            config_dir: "../guardrail_configs/chat"
            use_nemo: false
        - impl: llamaguard_only
          params:
            blocked_categories:
              - destructive_code
              - data_exfiltration
              - violence
              - self_harm
  governance:
    impl: allowlist_perms
    params:
      allow_all: true
      require_approval_tools: ["write_file", "run_bash"]
      audit_file: "../../log/governance-audit.jsonl"
  observability:
    impl: stacked_tracer
    params:
      providers:
        - impl: console_tracer
          params: {}
        - impl: langfuse_tracer
          params:
            project: "conch-stage2"
  context:
    impl: jit_compaction
    params:
      threshold: 0.4
